query_intake:
  description: >
    Review ONLY the user query {query} and restate it in clear analytical terms.
    Identify what the user is truly asking for in playlist-concept terms (mood,
    era, genre, energy, length, time-of-day use case), including explicit
    and obvious implicit constraints.
  expected_output: >
    Return ONLY valid JSON (no markdown, no prose) in this exact shape:
    {
      "clarified_query": "single-sentence rewrite of {query}",
      "playlist_objectives": ["short objective strings"],
      "constraints": {
        "genres": ["..."] ,
        "year_range": {"min": null, "max": null},
        "energy_range": {"min": null, "max": null},
        "target_track_count": null,
        "must_include": ["..."],
        "must_exclude": ["..."]
      }
    }
  agent: data_analyst

select_relevant_fields:
  description: >
    Using the JSON from query_intake as primary context, identify only the dataset
    columns needed to satisfy the playlist objectives and constraints. Restrict
    curation metadata to Artist, energy, Genre, and Year. Include Trackname and
    Filepath only as operational identifiers needed for final playlist output.
  expected_output: >
    Return ONLY valid JSON (no markdown, no prose):
    {
      "selected_fields": ["field_name_1", "field_name_2"],
      "field_rationale": {
        "field_name_1": "why this field is needed",
        "field_name_2": "why this field is needed"
      },
      "ready_for_filtering": true
    }
  agent: data_analyst

filter_dataset:
  description: >
    Use query_intake JSON + select_relevant_fields JSON + the full dataset at {db_path}.
    Apply the constraints to produce a filtered candidate pool. Treat target_track_count
    and inferred mood/era/energy constraints as preferences, not hard failure
    conditions. If exact matches are sparse, progressively relax the least essential
    filters and return a best-effort candidate pool instead of retrying for a perfect
    match. Do not curate final ordering yet; this step should maximize usable candidates
    while documenting any relaxation.
  expected_output: >
    Return ONLY valid JSON (no markdown, no prose):
    {
      "applied_filters": {
        "genres": ["..."],
        "year_range": {"min": null, "max": null},
        "energy_range": {"min": null, "max": null},
        "must_include": ["..."],
        "must_exclude": ["..."]
      },
      "candidate_count": 0,
      "candidate_tracks": [
        {
          "Trackname": "...",
          "Artist": "...",
          "Year": "...",
          "Genre": "...",
          "energy": 0,
          "Filepath": "..."
        }
      ],
      "notes": "brief note on any relaxed/strict assumptions; never retry solely because candidate_count is below target_track_count"
    }
  agent: data_analyst

analyze_relevant_data:
  description: >
    Analyze the filtered candidate pool from filter_dataset and summarize the
    strongest patterns needed for curation decisions (genre mix, era spread,
    energy profile, and any detected gaps vs objectives).
  expected_output: >
    Return ONLY valid JSON (no markdown, no prose):
    {
      "summary_insights": ["short insight strings"],
      "distribution": {
        "genres": {"genre_a": 0, "genre_b": 0},
        "years": {"bucket_or_year": 0},
        "energy": {"1-20": 0, "21-40": 0, "41-60": 0, "61-80": 0, "81-100": 0}
      },
      "gaps_vs_objectives": ["any mismatch or risk to objective fit"],
      "curation_guidance": ["ranking/selection guidance for final playlist"]
    }
  agent: data_analyst

curate_playlist:
  description: >
    Use all prior JSON outputs to produce the final playlist. Prioritize objective
    fit, variety, and coherent flow. The requested target_track_count is a goal rather
    than a hard requirement. If candidate_count is below target, still return the best
    possible playlist from available candidates and explain the shortfall clearly.
  expected_output: >
    Return ONLY valid JSON (no markdown, no prose):
    {
      "playlist_title": "...",
      "final_track_count": 0,
      "tracks": [
        {
          "position": 1,
          "Trackname": "...",
          "Artist": "...",
          "Year": "...",
          "Genre": "...",
          "energy": 0,
          "Filepath": "...",
          "why_selected": "one sentence"
        }
      ],
      "objective_fit_summary": ["how the list satisfies key objectives"],
      "unmet_constraints": ["only include if any constraints could not be met"]
    }
  agent: disc_jockey
