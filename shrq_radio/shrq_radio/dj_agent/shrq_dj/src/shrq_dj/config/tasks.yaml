query_intake:
  description: >
    Review ONLY the user query {query} and restate it
    in clear analytical terms. Identify what the user is truly asking for in terms of a
    playlist concept (e.g., mood, era, genre, energy, tempo, length, or time-of-day use
    case), including any explicit or obvious implicit constraints.
  expected_output: >
    A very short structured summary of the request in the following JSON format:
    {
      "clarified_query": "single-sentence rewrite of {query}",
      "playlist_objectives": ["bullet-style objectives like target mood, genres, years, BPM/energy ranges, track count"]
    }
  agent: data_analyst

select_relevant_fields:
  description: >
    Identify and select the fields from the database that are relevant to the playlist
    objectives clarified in the query intake. This helps in filtering the dataset efficiently.
  expected_output: >
    A list of field names from the data that are pertinent to the playlist objectives.
  agent: data_analyst

filter_dataset:
  description: >
    Using the selected relevant fields and the clarified query, filter the dataset 
    to include only entries that meet the playlist criteria.
  expected_output: >
    A filtered subset of {db} matching the playlist objectives.
  agent: data_analyst

analyze_relevant_data:
  description: >
    Analyze the filtered dataset to extract insights such as distribution of genres,
    energy levels, tempos, and other relevant statistics.
  expected_output: >
    A summary of analytical insights derived from the filtered dataset.
  agent: data_analyst

curate_playlist:
  description: >
    Curate a playlist based on the analyzed data and the clarified query, ensuring it
    meets the user's objectives in terms of mood, genre, energy, and other factors.
  expected_output: >
    A finalized playlist with track details formatted as per the user's requirements.
  agent: disc_jockey
